services:
  frontend:
    build:
      context: ./lab-app
      dockerfile: Dockerfile
    container_name: lab-app-frontend-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3000
    volumes:
      - ./lab-app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev"]
    networks:
      - lab-app-dev

  backend:
    build:
      context: ./lab-app-backend
      dockerfile: Dockerfile
    container_name: lab-app-backend-dev
    environment:
      NODE_ENV: development
      PORT: 8000
      USE_HTTPS: "true"
      CHROMA_URL: "http://chroma:8000"
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.1:8b"
      EMBEDDING_MODEL: "nomic-embed-text:v1.5"
    env_file:
      - ./backend.env
    volumes:
      - ./lab-app-backend:/app
      - /app/node_modules
    ports:
      - "8000:8000"
    command: ["npm", "run", "dev"]
    networks:
      - lab-app-dev

  chroma:
    image: chromadb/chroma:latest
    container_name: lab-app-chroma-dev
    volumes:
      - chroma-dev-data:/chroma
    networks:
      - lab-app-dev

  ollama:
    image: ollama/ollama:latest
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 20
    container_name: lab-app-ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama-dev-data:/root/.ollama
    networks:
      - lab-app-dev

networks:
  lab-app-dev:
    driver: bridge

volumes:
  chroma-dev-data:
  ollama-dev-data:
