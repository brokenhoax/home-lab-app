version: "3.9"

services:
  frontend:
    image: brokenhoax/lab-app-frontend:latest
    container_name: lab-app-frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://krauscloud.com
    depends_on:
      backend:
        condition: service_started
    networks:
      - lab-app-net

  backend:
    image: brokenhoax/lab-app-backend:latest
    container_name: lab-app-backend
    environment:
      NODE_ENV: production
      PORT: 8000
      USE_HTTPS: "false"
      CHROMA_URL: "http://chroma:8000"
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.1:8b"
      EMBEDDING_MODEL: "nomic-embed-text:v1.5"
    depends_on:
      chroma:
        condition: service_started
    networks:
      - lab-app-net

  chroma:
    image: chromadb/chroma:latest
    container_name: lab-app-chroma
    volumes:
      - chroma-data:/chroma
    networks:
      - lab-app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: lab-app-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - lab-app-net

  ingest:
    image: brokenhoax/lab-app-backend:latest
    container_name: lab-app-ingest
    depends_on:
      chroma:
        condition: service_started
    environment:
      NODE_ENV: production
      CHROMA_URL: "http://chroma:8000"
      OLLAMA_HOST: "http://host.docker.internal:11434"
    command: ["npm", "run", "docker_ingest"]
    networks:
      - lab-app-net
    restart: "no"

networks:
  lab-app-net:
    driver: bridge

volumes:
  chroma-data:
