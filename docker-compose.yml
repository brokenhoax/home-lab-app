services:
  frontend:
    image: brokenhoax/lab-app-frontend:latest
    container_name: lab-app-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "http://localhost"
    depends_on:
      - backend
    networks:
      - lab-app-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    image: brokenhoax/lab-app-backend:latest
    container_name: lab-app-backend
    env_file:
      - ./backend.env
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: 8000
      USE_HTTPS: "false"
      CHROMA_URL: "http://chroma:8000"
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.1:8b"
      EMBEDDING_MODEL: "nomic-embed-text:v1.5"
    networks:
      - lab-app-net
    volumes:
      - chroma-data:/app/dist/data
    depends_on:
      - chroma
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chroma:
    image: chromadb/chroma:latest
    container_name: lab-app-chroma
    ports:
      - "9001:8000"
    networks:
      - lab-app-net
    volumes:
      - chroma-data:/chroma

  nginx:
    image: nginx:1.27-alpine
    container_name: lab-app-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lab-app-net

  ingest:
    profiles: ["ingest"]
    image: brokenhoax/lab-app-backend:latest
    env_file:
      - ./backend.env
    networks:
      - lab-app-net
    environment:
      NODE_ENV: production
      CHROMA_URL: "http://chroma:8000"
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.1:8b"
      EMBEDDING_MODEL: "nomic-embed-text:v1.5"
    volumes:
      - ./data:/app/data:ro
    command: ["node", "dist/ingest.js", "--reset"]
    depends_on:
      - chroma
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  lab-app-net:
    driver: bridge

volumes:
  chroma-data:
