version: "3.9"

services:
  frontend:
    image: brokenhoax/lab-app-frontend:latest
    container_name: lab-app-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://krauscloud.com
      API_URL: https://krauscloud.com
    depends_on:
      - backend
    networks:
      - lab-app-net

  backend:
    image: brokenhoax/lab-app-backend:latest
    container_name: lab-app-backend
    environment:
      NODE_ENV: production
      PORT: 8000
      USE_HTTPS: "true"
      OLLAMA_MODEL: "llama3.1:8b"
      EMBEDDING_MODEL: "nomic-embed-text:v1.5"
    env_file:
      - ./backend.env
    depends_on:
      - chroma
      - ollama
    networks:
      - lab-app-net

  chroma:
    image: chromadb/chroma:latest
    container_name: lab-app-chroma
    volumes:
      - chroma-data:/chroma
    networks:
      - lab-app-net

  ollama:
    image: ollama/ollama:latest
    container_name: lab-app-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - lab-app-net
    command: >
      /bin/sh -c "
        ollama serve &
        sleep 5 &&
        ollama pull llama3.1:8b &&
        ollama pull nomic-embed-text:v1.5 &&
        wait
      "

  nginx:
    image: nginx:1.27-alpine
    container_name: lab-app-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - lab-app-net

  ingest:
    image: brokenhoax/lab-app-backend:latest
    container_name: lab-app-ingest
    depends_on:
      - chroma
      - ollama
    environment:
      NODE_ENV: production
    command: ["npm", "run", "prod_ingest"]
    networks:
      - lab-app-net
    restart: "no"

networks:
  lab-app-net:
    driver: bridge

volumes:
  chroma-data:
  ollama-data:
